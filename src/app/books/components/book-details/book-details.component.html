<article class="m-3">
  <a routerLink="/books" class="btn btn-link mb-3">Back to list</a>
  <div class="card">
    <div class="card-body">
      <h3 class="card-title">{{ book.title }}</h3>
      <h6 class="card-subtitle mb-2 text-muted">
        {{ book.author }} • {{ book.year }}
      </h6>
      <p class="card-text">{{ book.description }}</p>
    </div>
  </div>
</article>
