<article class="m-3">
  <h2>Edit book</h2>
  <form class="mt-3" [formGroup]="bookForm" (ngSubmit)="save()">
    <div class="mb-3">
      <label class="form-label" for="book-title">Title</label>
      <input
        id="book-title"
        type="text"
        class="form-control"
        formControlName="title"
      />
    </div>
    <div class="mb-3">
      <label class="form-label" for="book-author">Author</label>
      <input
        id="book-author"
        type="text"
        class="form-control"
        formControlName="author"
      />
    </div>
    <div class="mb-3">
      <label class="form-label" for="book-year">Year</label>
      <input
        id="book-year"
        type="number"
        class="form-control"
        formControlName="year"
      />
    </div>
    <div class="mb-3">
      <label class="form-label" for="book-description">Description</label>
      <textarea
        id="book-description"
        class="form-control"
        rows="6"
        formControlName="description"
      ></textarea>
    </div>
    <div class="d-flex gap-2">
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="bookForm.invalid || isSaving"
      >
        Save
      </button>
      <a routerLink="/books" class="btn btn-link">Back to list</a>
    </div>
  </form>
</article>
